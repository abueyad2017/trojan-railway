<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hysteria2 Proxy Server</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; margin: 0; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .btn { background: #4a90e2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; transition: 0.3s; width: 100%; }
        .btn:hover { background: #357abd; }
        .config-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 20px; word-break: break-all; font-family: monospace; display: none; text-align: left; }
        .status { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hysteria2 Proxy</h1>
        <p>سيرفرك الخاص يعمل بكفاءة</p>
        <p>حالة السيرفر: <span class="status">Online</span></p>
        <button class="btn" onclick="showConfig()">Get My Hysteria Config</button>
        <div id="config" class="config-box">
            hysteria2://{{PASSWORD}}@{{HOST}}:443?insecure=1&sni={{HOST}}#Hysteria_AbuEyad
        </div>
    </div>

    <script>
        function showConfig() {
            document.getElementById('config').style.display = 'block';
        }
    </script>
</body>
</html>
